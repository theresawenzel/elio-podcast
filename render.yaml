# Render deployment config for the Elio podcast agent.
# Cron job + managed Postgres database.

services:
  - type: cron
    name: elio-podcast
    runtime: python
    plan: starter
    region: oregon
    schedule: "30 11,12 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python agent.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elio-podcast-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ALEX
        sync: false
      - key: ELEVENLABS_VOICE_LAUREN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: WHATSAPP_NUMBER_THERESA
        sync: false
      - key: WHATSAPP_NUMBER_HUSBAND
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: GOOGLE_DOC_ID
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: HEALTHCHECK_URL
        sync: false

databases:
  - name: elio-podcast-db
    plan: free
    region: oregon
